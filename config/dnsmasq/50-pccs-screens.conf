# PCCS touchscreen DHCP reservations (installed to /etc/dnsmasq.d/ by scripts/install-dnsmasq-screens.sh)
# Format: dhcp-host=MAC,IP,hostname,lease
# Reserved IPs may sit outside dhcp-range — dnsmasq honours these before dynamic assignments.

# Kitchen touchscreen (Radxa ROCK 5C) — must match [screens] host in config/pccs.conf
dhcp-host=52:58:15:8a:56:f6,10.10.10.10,kitchen,infinite
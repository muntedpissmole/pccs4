# PCCS4 demo — reverse proxy to Flask-SocketIO on localhost:5000
# Installed by scripts/install-demo.sh → /etc/nginx/sites-available/pccs-demo

upstream pccs_demo_app {
    server 127.0.0.1:5000;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name @SERVER_NAME@;

    client_max_body_size 16m;

    access_log /var/log/nginx/pccs-demo.access.log;
    error_log  /var/log/nginx/pccs-demo.error.log;

    location /socket.io/ {
        proxy_pass http://pccs_demo_app/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://pccs_demo_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
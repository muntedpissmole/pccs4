# =============================================================================
# Pissmole Camper Control System (PCCS)
# Main Configuration File: pccs.conf
#
# Edit this file and restart the app for changes to take effect.
#
# Demo installs: do not edit this file on the server — git pull will overwrite it.
# Put machine-specific overrides in config/pccs.local.conf (written by install-demo.sh).
# =============================================================================

[demo]
# Self-contained demo mode for Ubuntu server (no Pi GPIO, Arduino, GPS, Sonos, or Victron).
# This branch ships with demo mode enabled. Set to false only if running real hardware.
enabled = true

# Demo location — fixed Melbourne CBD (GPS tile, sun times, weather).
ip_geolocation = false
latitude = -37.8136
longitude = 144.9631
timezone = Australia/Melbourne
suburb = Melbourne CBD

# Simulated battery state of charge (%) — varies slowly around this value.
battery_soc = 78

# Simulated fresh water tank level (%).
water_level_pct = 72

# Drift water tank level every few hours (stays between min/max).
water_level_drift = true
water_level_min_hours = 2
water_level_max_hours = 6
water_level_min_pct = 35
water_level_max_pct = 95

# System tile: keep 3 of 4 modules online; rotate which one is offline.
module_offline_rotate = true
module_offline_min_hours = 2
module_offline_max_hours = 6

# Randomly open/close a reed switch on this interval (hours).
reed_random_toggle = true
reed_toggle_min_hours = 2
reed_toggle_max_hours = 6

# Start demo Sonos playback on launch.
sonos_autoplay = true

# Per-reed initial state (true = closed). Uncomment to override defaults.
# reed_kitchen_panel_closed = false


[system]
# Secret key used by Flask for session management and security.
# IMPORTANT: Change this to a long random string before deployment!
secret_key = aXkAuLLrlwmopUraKiSfFLOryb1SOL5BEByshFShZCZHb0EVd7g9YYPk2zyd8OYD

# IP address the web server binds to.
# Use 0.0.0.0 to allow access from phones, tablets, and other devices on the network.
host = 0.0.0.0

# Port the web interface runs on.
port = 5000

# Run Flask in debug mode (more detailed logs + auto-reloader for .py files).
# Also enables TEMPLATES_AUTO_RELOAD + disables static file caching + clears
# Jinja template cache so you can edit templates/index.html and static/
# (JS/CSS etc.) and see changes by refreshing the browser.
#
# IMPORTANT:
# - After changing this value you must restart app.py once for it to take effect.
# - For changes to .js / .css / other static assets you almost always need a
#   HARD refresh in the browser (Ctrl+Shift+R or Cmd+Shift+R), or enable
#   "Disable cache" in the Network tab of DevTools. Browsers cache these
#   aggressively even with server no-cache headers.
# - Pure template (.html) changes usually work with a normal refresh once
#   the above is set up.
# Set to true only during development. MUST be false for deployment.
debug = true


[logging]
# Default logging level for the entire application.
# Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO

# Suppress noisy log messages from Flask's built-in web server
suppress_werkzeug = true

# Suppress noisy log messages from SocketIO engine
suppress_engineio = true

# Suppress noisy log messages from SocketIO itself
suppress_socketio = true

# Folder where log files are stored (daily rotating files)
log_directory = logs

# After a power cut the RTC may be wrong until NTP syncs. PCCS waits this many
# seconds for NTP before choosing Day/Evening/Night and running startup lights.
# Set to 0 to skip waiting. Log lines always include +uptime since boot.
clock_sync_timeout_s = 0

# Number of days to keep old log files (31 days = roughly one month)
log_retention_days = 31


# =============================================================================
# LIGHTING & RAMP CONTROL
# =============================================================================

[lighting]
# Ramp time in milliseconds for manual changes from the web interface (sliders, buttons, etc.)
ui_ramp_time_ms = 1000

# Crossfade duration for bug-mode UI controls (slider fill, toggle, chip, icons)
ui_bug_mode_crossfade_ms = 1000

# Ramp time in milliseconds for changes triggered by reed switches / doors
reed_ramp_time_ms = 2000

# Ramp time in milliseconds when activating manual scenes
scene_ramp_time_ms = 4000

# Ramp time in milliseconds during automatic Day → Evening → Night phase transitions
phase_ramp_time_ms = 4000

# =============================================================================
# HARDWARE MAPPINGS
# =============================================================================

[arduino]
# Serial ports the system will try in order when connecting to the Arduino.
# Common values on Raspberry Pi: /dev/ttyACM0, /dev/ttyUSB0, /dev/serial0
serial_ports = /dev/ttyACM0, /dev/ttyUSB0, /dev/serial0, /dev/ttyAMA0

# Baud rate for communication with the Arduino
baud_rate = 500000

# Timeout in seconds when reading responses from the Arduino
timeout = 0.5

# Delay in seconds after opening the serial port before sending commands
# (gives Arduino time to reset and be ready)
init_delay = 2.5

# How long (seconds) the system ignores hardware feedback after a user changes
# a light via the web interface. Prevents slider jitter / fighting.
optimistic_lock_duration = 2.5

# Extra delay after sending a command (seconds)
command_delay = 0.08
response_delay = 0.04

# Ramp times used when directly controlling RGB bug lights
rgb_red_switch_ramp_ms = 180
rgb_mode_switch_ramp_ms = 250

# =============================================================================
# LIGHTING & GPIO
# =============================================================================

[lights]
# Format: internal_name = Friendly Name | type | pin(s) | icon | order
# Types: pwm, rgb_bug
# Order: Determines what order the lights render on the front end.
#        You control the exact order of everything (dimmers + relays).

rooftop_tent      = Rooftop Tent      | pwm     | 12         | fa-tent          | 1
kitchen_bench     = Kitchen Bench     | pwm     | 5          | fa-mug-hot       | 2
storage_panel     = Storage Panel     | pwm     | 6          | fa-boxes-stacked | 3
rear_drawer       = Rear Drawer       | pwm     | 7          | fa-archive       | 4
accent            = Accent Lights     | pwm     | 8          | fa-lightbulb     | 5
ensuite           = Ensuite           | pwm     | 13         | fa-bath          | 6
kitchen_panel     = Kitchen Panel     | rgb_bug | 2 | 3 | 4  | fa-utensils      | 7
awning            = Awning Lights     | rgb_bug | 9 | 10| 11 | fa-umbrella      | 8

[gpio]
# Relay channels (on/off)
# Format: internal_name = Friendly Name | pin | active_high | initial_state | icon | order
# The order can be mixed and matched with the above lights.

floodlights         = Floodlights       | 17 | false | false | fa-lightbulb     | 20
# water_circuit     = Water Circuit     | 18 | false | false | fa-faucet        | 21
# lighting_circuit  = Lighting Circuit  | 22 | false | false | fa-lightbulb     | 22
# fridge_oven       = Fridge + Oven     | 27 | false | false | fa-kitchen-set   | 23

[reeds]
# Format: internal_name = Friendly Name | pin | pull_up | bounce_time | icon | order | controls:light1,light2,...
# - Leave the controls field empty to control a light with same internal name, otherwise:
# - controls:lightname         to control a single light
# - controls:light1,light2     to control multiple lights (separate with commas)
# - bounce_time: 0.05 (50ms) is a good default for reed switches. 0.5s is too long and can make a
#   reed appear stuck after a release edge until the window expires.

kitchen_panel     = Kitchen Panel     | 23 | true | 0.05 | fa-utensils      | 10 | kitchen_panel
kitchen_bench     = Kitchen Bench     | 12 | true | 0.05 | fa-mug-hot       | 11 |
storage_panel     = Storage Panel     | 24 | true | 0.05 | fa-boxes-stacked | 12 |
rear_drawer       = Rear Drawer       | 25 | true | 0.05 | fa-archive       | 13 |
rooftop_tent      = Rooftop Tent      | 26 | true | 0.05 | fa-tent          | 14 |

[arduino analog]
# Analog input pin used by the SensorManager for water level (A1).
water_pin = 1

[reeds.interlocks]
# Format: controlled_reed = required_reed1, required_reed2, ...
kitchen_bench = kitchen_panel


# =============================================================================
# REMOTE TOUCHSCREENS
# PCCS-controlled touchscreens turned on/off over SSH
# =============================================================================

[screens]
# Format:
# internal_name = Friendly Name | linked_reed | host | username | brightness_path | icon | day | evening | night | blank_path
#
# Fields:
#   linked_reed       → Must exactly match an internal_name from [reeds]
#   host              → IP address or hostname (e.g. 192.168.1.55 or galley.local)
#   username          → SSH username on the remote Pi (required even with passwordless SSH)
#   brightness_path   → Remote control target (see below)
#   icon              → Font Awesome icon for the System tab (optional, default fa-display)
#   day / evening / night → Brightness percent (0–100) while the linked reed is open.
#                           Defaults: day 100, evening 30, night 5. Reed closed = 0%.
#   blank_path        → Optional sysfs blank path (e.g. /sys/class/graphics/fb0/blank).
#                       When brightness hits 0%, PCCS also blanks the framebuffer so
#                       Waveshare/HDMI panels fully turn off (backlight-only 0% often
#                       leaves a faint glow). Auto-used for KDE D-Bus and sysfs backlight
#                       paths unless set to "none". Requires scripts/setup-screen.sh.
#
# brightness_path options:
#   sysfs blank/backlight — e.g. /sys/class/graphics/fb0/blank
#       Radxa OS / simple fb drivers: 0 = awake, 1 or 4 = blanked.
#       May need passwordless sudo tee on the remote (scripts/setup-screen.sh).
#   sysfs backlight — e.g. /sys/class/backlight/*/brightness (0 = off, max = on)
#   D-Bus KDE brightness — dbus:org.kde.ScreenBrightness:/org/kde/ScreenBrightness/display0
#       Armbian + KDE Plasma / Wayland with external HDMI panel (ROCK 5C kitchen).
#       SetBrightness 0 = off, MaxBrightness = on. Session bus — no sudo required.
#   D-Bus screensaver — dbus:org.freedesktop.ScreenSaver
#       Fallback for internal laptop panels; does not blank HDMI on the kitchen kiosk.
#
# Notes:
# - Run scripts/setup-screen.sh on the PCCS Pi once per touchscreen (SSH + blank perms).
# - The Screens tile reads the real remote state (sysfs, D-Bus brightness, or GetActive).
# - Test uses BatchMode + publickey; fix ~/.ssh/config Host/IdentityFile if it fails.
#
kitchen          = Kitchen         | kitchen_panel | 10.10.10.10 | joel  | dbus:org.kde.ScreenBrightness:/org/kde/ScreenBrightness/display0 | fa-utensils | 100 | 30 | 5 | /sys/class/graphics/fb0/blank


[reed_monitor]
# Reed debouncing — two layers:
#   reed_stable_polls  Consecutive matching GPIO reads before a transition is accepted.
#                      At the default 200ms poll interval, 3 polls ≈ 600ms the line must
#                      stay at the new level. Brief noise spikes in shared conduit are ignored.
#   reed_debounce_ms   Minimum milliseconds between accepted transitions (extra guard
#                      against slow flip-flop after a real edge).
reed_stable_polls = 3
reed_debounce_ms = 250


[background_sync]
# How often (in seconds) the system forces a full state read from the Arduino
# to keep the UI and internal state synchronized
sync_interval = 45


# =============================================================================
# AMBIENT LIGHTING
# Lights that automatically react to phase changes and reed states
# =============================================================================
[ambient]
# Lights that will also turn on whenever one or more reed switches are open.
# Day ramps to 0, specify a custom level if desired.
# IMPORTANT: The light name (e.g. kitchen_panel) MUST exactly match 
# an internal light name defined in the [lights] section above.
# If the name doesn't match, that light will be ignored and a warning generated.

[ambient.awning]
evening = 20,white
night   = 10,red

[ambient.accent]
evening = 20
night   = 5

# What should happen to ambient lights when ALL reed switches are closed during evening and night?
# Options:
#   off          = turn them completely off (default)
#   dim         = use the "night" level
all_closed_action = off


# =============================================================================
# REED PHASE LIGHT LEVELS
# What brightness each light should go to when its reed is opened
# =============================================================================
# IMPORTANT: The light name (e.g. kitchen_panel) MUST exactly match 
# an internal light name defined in the [lights] section above.
# If the name doesn't match, that light will be ignored and a warning generated.

[reed_phases.kitchen_panel]
day     = 100,white
evening = 20,white
night   = 10,red

[reed_phases.kitchen_bench]
day     = 100
evening = 50
night   = 10

[reed_phases.storage_panel]
day     = 100
evening = 30
night   = 5

[reed_phases.rear_drawer]
day     = 0
evening = 50
night   = 10

[reed_phases.rooftop_tent]
day     = 0
evening = 20
night   = 5

# =============================================================================
# PHASES & DAY/NIGHT AUTOMATION
# =============================================================================

[phases]
# Minutes after sunrise before the "Day" phase begins
day_offset_minutes = 45

# Minutes before sunset before the "Evening" phase begins
evening_offset_minutes = 45

# Fixed hour (24-hour format) when the Night phase is forced to start
night_start_hour = 20

# Seconds to wait for a valid GPS fix at startup before using fallback sun times
gps_startup_timeout = 900

# Seconds without a GPS fix before switching to fallback sun calculations
gps_loss_timeout = 3600


# =============================================================================
# SCENES
# =============================================================================
# Each scene gets its own section: [scenes.internal_name]
# Scene buttons appear in the UI in the order defined by the "order =" key
# Scenes use the ramp time defined in [lighting] → scene_ramp_time_ms
# Scenes only affect lights when their controlling reed is open (ambient lights will trigger only if at least one reed is open)
# If you activate a scene then open the reed, that reed/light will follow it's normal behaviour (i.e. wont' ramp to scene level)
#
#    Define individual lights and their target brightness in % (and colour for bug-mode capable lights).
#    Any lights not included in a scene will be ignored.
#    You can reference a phase instead of a fixed value:
#    accent = night
#    This will automatically pull the brightness (and colour if defined) from either:
#      - [reed_phases.<lightname>] (preferred)
#      - [ambient.<lightname>]     (fallback)
#
#
# Special operators:
#   all_off         = true     Turn all lights off (per-light entries override, e.g. accent = 2)
#   evening_levels  = true     Apply evening levels from reed_phases + ambient
#   night_levels    = true     Apply night levels from reed_phases + ambient
#   day_levels      = true     Apply day levels from reed_phases + ambient
#
# You can combine a special operator with other lights or phase references:
#   evening_levels = true
#   kitchen_bench  = 85
#   ensuite        = 100
#   accent         = night
#   rooftop_tent   = night
#
# Example:
# [scenes.evening_mood]
# evening_levels = true
# accent         = night        # override ambient/reed phase
# kitchen_panel  = 60
# ensuite        = 100
#
# IMPORTANT:
# - The light name (e.g. kitchen_panel) MUST exactly match an internal light name
#   defined in the [lights] section (and optionally [ambient] or [reed_phases]).
# - If a phase (day/evening/night) is used but no value is defined for that light
#   in reed_phases or ambient, a warning is logged and the light is skipped.
# - If the name doesn't match any light, that entry will be ignored with a warning.


[scenes.bedtime]
name        = Bedtime
icon        = fa-moon
order       = 1
description = Dim lights when heading to bed

kitchen_panel   = 5,white
kitchen_bench   = 5
storage_panel   = 5
accent          = night
awning          = night,white
rooftop_tent    = 5
ensuite         = 10


[scenes.ensuite]
name        = Ensuite
icon        = fa-bath
order       = 2
description = Use the bathroom in the middle of the night

accent       = night
rooftop_tent = 2
ensuite      = 10


[scenes.goodnight]
name        = Goodnight
icon        = fa-bed
order       = 3
description = All lights off except a dim accent nightlight

all_off = true
accent  = 2


[scenes.evening]
name        = Evening
icon        = fa-cloud-sun
order       = 4
description = Set/reset lights to evening levels

evening_levels = true


[scenes.night]
name        = Night
icon        = fa-cloud-moon
order       = 5
description = Set/reset lights to night levels

night_levels = true


[scenes.all_off]
name        = All Off
icon        = fa-power-off
order       = 6
description = Turn everything off

all_off = true


# =============================================================================
# GPS
# =============================================================================

[gps]
# Serial ports tried (in order) for the GPS module
serial_ports = /dev/serial0, /dev/ttyS0, /dev/ttyAMA0, /dev/ttyUSB0, /dev/ttyUSB1

# GPS module baud rate
baud_rate = 9600

# Serial timeout for GPS reads (seconds)
timeout = 0.8

# Fallback location when no GPS fix is available
fallback_latitude = -37.8136
fallback_longitude = 144.9631
fallback_name = Melbourne CBD
fallback_timezone = Australia/Melbourne

# Minimum movement distance (km) before updating suburb name
movement_threshold_km = 2.0

# How often (seconds) suburb name is re-looked up
suburb_update_interval = 3600

# How often (seconds) sunrise/sunset times are refreshed
sun_update_interval = 3600

# How often (seconds) GPS data is broadcast to connected clients
broadcast_interval = 10

# Minimum time (seconds) between GPS fix lost/acquired toast messages
toast_cooldown = 3.0


# =============================================================================
# TANK CAPACITIES
# =============================================================================

[tanks]
# Fresh water tank capacity in litres (shown under the % on the water tile)
water_litres = 160


# =============================================================================
# SENSORS (Water level + Temperature)
# =============================================================================

[sensors]
# How often (seconds) all sensors are read and broadcast to the UI
update_interval = 5

# Water level sensor resistances (ohms)
water_resistance_empty = 240
water_resistance_full = 33

# 1-Wire DS18B20 temperature sensors (on the same w1-gpio bus)
# Find IDs with: ls /sys/bus/w1/devices/ | grep ^28
# The "outside" sensor defaults to the first 28* device found if ID left blank.
# Fridge/freezer sensors are optional — leave blank until installed.
#
# If you see "Configured 1-Wire sensor not present" warnings, the ID in config
# does not match any device on the bus. The log will list available sensors.
# Update this config with the correct ID(s) and restart pccs4.service.
outside_temp_sensor = 28-000000bb807f
fridge_temp_sensor  =
freezer_temp_sensor =

# =============================================================================
# VICTRON (SmartShunt battery monitor + MPPT SmartSolar charger via BLE)
# =============================================================================
# Uses the victron_ble library (passive BLE "Instant Readout" advertisements).
# Obtain MAC + key from VictronConnect app: device → gear → Product info →
# "Instant readout via Bluetooth" → Show.

[victron]
# Demo mode simulates Victron telemetry — these placeholders keep the config valid.
shunt_address = aa:bb:cc:11:22:33
shunt_key     = 00000000000000000000000000000000

mppt_address  = aa:bb:cc:44:55:66
mppt_key      = 00000000000000000000000000000000

# Seconds between UI broadcasts even if values haven't changed much
scan_interval = 2

# Seconds without a BLE advert before a device is marked stale/offline in the UI.
# Victron Instant Readout can gap for minutes (range, interference, low solar) — keep this generous.
stale_timeout = 600


# =============================================================================
# TOAST NOTIFICATIONS
# =============================================================================

[toasts]
# Default display duration for normal toasts (milliseconds)
default_duration = 5000

# How long error toasts stay on screen (milliseconds)
error_duration = 8000

# How long warning toasts stay on screen (milliseconds)
warning_duration = 6000

# How long the rooftop tent safety warning toast stays visible before auto-clearing
# (shown when someone tries to turn on the tent light while the tent is physically closed)
rooftop_tent_safety_warning_timeout = 30


# =============================================================================
# UI / THEMES
# =============================================================================
[ui]
# Default theme when active_theme.json is missing or invalid.
# Should match one of your actual theme filenames (without .css)
default_theme = base


# =============================================================================
# SONOS INTEGRATION
# =============================================================================

[sonos]
# Enable/disable Sonos integration completely
enabled = true

# IP Address of the network card that has your Sonos speakers on it (the SoCo library can try to scan the WAN connection otherwise)
interface_addr = 10.10.10.1

# Preferred speaker name (partial match, case-insensitive)
# The system will try this first
player_name = Kitchen

# If the preferred speaker is not found, automatically use the first available speaker?
# Set to false if you only want to use the exact preferred speaker (useful if you have many Sonos devices)
auto_select_first = true

# How often the poller checks the current track/state (seconds)
poll_interval = 3

# Minimum time between full network discoveries (seconds)
discovery_interval = 300

# Timeout for discovery scan
discovery_timeout = 8

# Default volume when first connecting to a speaker (0-100)
# Set to -1 to leave the speaker's current volume untouched
default_volume = -1

# =============================================================================
# END OF CONFIGURATION
# =============================================================================
